{% extends "pages/main.html" %}

{% block title %}
FAPAKI Laundry
{% endblock %}

{% block head %}
<style>
    body {
        background: #f0f2f5;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
    }

    .chat-container {
        max-width: 500px;
        width: 100%;
        height: 100dvh;
        background: white;
        display: flex;
        flex-direction: column;
    }

    #chatBody {
        display: flex;
        flex-direction: column;
        padding: 15px;
        background-color: #ffffff;
        flex: 1;
        overflow-y: auto;
    }

    .message {
        max-width: 80%;
        margin-bottom: 12px;
        padding: 8px 12px;
        border-radius: 8px;
        font-family: sans-serif;
        line-height: 1.4;
        box-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
    }

    .user {
        align-self: flex-end;
        background-color: #dcf8c6;
    }

    .bot {
        align-self: flex-start;
        background-color: #ffffff;
    }

    .chat-header {
        background: white;
        height: 3rem;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        border-bottom: 1px solid #eee;
        flex-shrink: 0;
    }

    .back-btn {
        position: absolute;
        top: -9px;
        left: 15px;
        font-size: 35px;
        color: black;
        text-decoration: none;
    }

    .title {
        font-size: 16px;
        font-weight: 600;
    }

    .message-time {
        display: block;
        font-size: 0.65em;
        color: #888;
        margin-top: 4px;
        text-align: right;
    }

    .chat-input {
        padding: 10px;
        border-top: 1px solid #eee;
        background: white;
        flex-shrink: 0;
    }
</style>
{% endblock %}

{% block content %}

<div class="chat-container">

    <!-- HEADER -->
    <div class="chat-header">
        <a href="{{ url_for('page_routes.dashboard_page') }}" class="back-btn">←</a>
        <span class="title">FAPAKI Laundry</span>
    </div>

    <!-- BODY -->
    <div class="chat-body" id="chatBody">
        <div class="message bot">
            <b>Halo</b> ada yang bisa saya bantu?
        </div>
    </div>

    <!-- INPUT -->
    <div class="chat-input">

        <form id="chatForm">

            <div class="input-group">

                <input type="text" id="messageInput" class="form-control" placeholder="Ketik pesan...">

                <button class="btn btn-primary">
                    Send
                </button>

            </div>

        </form>

    </div>

</div>

<script>
    const form = document.getElementById("chatForm");
    const input = document.getElementById("messageInput");
    const chatBody = document.getElementById("chatBody");

    function addMessage(text, type) {
        const messageEl = document.createElement("div");
        messageEl.className = "message " + type;

        const bodyEl = document.createElement("div");
        bodyEl.style.whiteSpace = "pre-wrap";
        bodyEl.innerText = text;
        messageEl.appendChild(bodyEl);

        const timeEl = document.createElement("span");
        timeEl.className = "message-time";

        const now = new Date();
        timeEl.innerText =
            now.getHours().toString().padStart(2, '0')
            + ":" +
            now.getMinutes().toString().padStart(2, '0');

        messageEl.appendChild(timeEl);

        chatBody.appendChild(messageEl);
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    form.addEventListener("submit", async function (e) {
        e.preventDefault();

        let message = input.value;
        if (!message.trim()) return;

        addMessage(message, "user");
        input.value = "";

        // 1. Ambil chat_id terakhir yang disimpan di browser (jika ada)
        let activeChatId = sessionStorage.getItem("active_chat_id") || null;

        try {
            let res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                // 2. Kirim message dan chat_id ke api_routes.py
                body: JSON.stringify({ message: message, chat_id: activeChatId })
            });

            let data = await res.json();
            
            // Sesuai struktur return api_routes.py
            let resp = data.response || data;

            // 3. Jika backend mengembalikan chat_id baru (dari proses ranking), simpan ke browser
            if (resp.chat_id) {
                sessionStorage.setItem("active_chat_id", resp.chat_id);
            }

            let botText = "";

            const hasArray = Array.isArray(resp.data);
            const first = hasArray ? resp.data[0] : null;

            // ====================================================
            // 🎁 1. MENU TANYA HADIAH & REKOMENDASI (DORONGAN)
            // ====================================================
            if (hasArray && first && first.rekomendasi !== undefined) {
                botText += `🎁 ${resp.summary || ""}\n\n`;

                resp.data.forEach(item => {
                    botText += `${item.peringkat}. ${item.nama}\n`;

                    if (item.hadiah && item.hadiah !== "TIDAK_DAPAT_HADIAH") {
                        botText += `🎁 ${item.hadiah}\n`;
                    }

                    if (item.rekomendasi) {
                        botText += `💡 ${item.rekomendasi}\n`;
                    }

                    if (item.alasan) {
                        botText += `👉 ${item.alasan}\n`;
                    }

                    botText += `────────────────\n`;
                });
            }

            // ====================================================
            // 2. MENU PENJELASAN / ALASAN (MURNI TANPA REKOMENDASI)
            // ====================================================
            else if (hasArray && first && first.alasan) {
                botText += `💡 ${resp.summary || ""}\n\n`;

                resp.data.forEach(item => {
                    botText += `${item.peringkat}. ${item.nama}\n👉 ${item.alasan}\n\n`;
                });
            }

            // ====================================================
            // 3. MENU RANKING / DAFTAR TERBAIK
            // ====================================================
            else if (resp.data && typeof resp.data === "object" && !hasArray) {
                const keys = Object.keys(resp.data);

                if (keys.length > 0) {
                    const firstKey = keys[0];
                    const firstGroup = resp.data[firstKey];

                    botText += `🏆 DAFTAR ${firstKey.toUpperCase()}:\n📅 ${resp.summary || ""}\n\n`;

                    // Penyesuaian membaca inner structure data jika ada key 'detail'
                    const list = firstGroup?.detail?.data || firstGroup?.data || [];
                    list.forEach((item, i) => {
                        let wp = item.nilai_wp
                            ? Number(item.nilai_wp).toFixed(4)
                            : "0.0000";

                        botText += `${i + 1}. ${item.nama} (WP: ${wp})\n`;
                    });
                }
            }

            // ====================================================
            // ❌ 4. DATA TIDAK DITEMUKAN
            // ====================================================
            else {
                botText = resp.message || "Data tidak ditemukan";
            }

            addMessage(botText, "bot");

        } catch (err) {
            console.log(err);
            addMessage("Terjadi kesalahan koneksi.", "bot");
        }
    });
</script>
{% endblock %}
