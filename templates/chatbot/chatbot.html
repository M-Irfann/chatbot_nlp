{% extends "pages/main.html" %}

{% block title %}
FAPAKI Laundry
{% endblock %}

{% block head %}
    <style>

    body{
        background: #f0f2f5;
        margin:0;
        padding:0;
        display:flex;
        justify-content:center;
    }

    .chat-container{
        max-width: 500px;
        width:100%;
        height: 100dvh;
        background:white;
        display:flex;
        flex-direction:column;
    }

    #chatBody {
        display: flex;
        flex-direction: column;
        padding: 15px;
        background-color: #ffffff;
        flex:1;
        overflow-y: auto;
    }

    /* Balon Chat Umum */
    .message {
        max-width: 80%;
        margin-bottom: 12px;
        padding: 8px 12px;
        border-radius: 8px;
        position: relative;
        font-family: sans-serif;
        line-height: 1.4;
        cursor: pointer;
        box-shadow: 0 1px 1px rgba(0,0,0,0.1);
    }

    /* Balon User */
    .user {
        align-self: flex-end;
        background-color: #dcf8c6;
        border-bottom-right-radius: 2px;
    }

    .chat-header {
        background: white;
        height: 3rem;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        border-bottom: 1px solid #eee;
        flex-shrink:0;
    }

    /* tombol back */
    .back-btn {
        position: absolute;
        top: -9px;
        left: 15px;
        font-size: 35px;
        color: black;
        text-decoration: none;
    }

    /* judul */
    .title {
        font-size: 16px;
        font-weight: 600;
    }

    /* highlight */
    .highlight {
        background-color: #ffeaa7 !important;
        transition: background-color 0.5s ease;
    }

    /* Balon Bot */
    .bot {
        align-self: flex-start;
        background-color: #ffffff;
        border-bottom-left-radius: 2px;
    }

    /* Waktu Pesan */
    .message-time {
        display: block;
        font-size: 0.65em;
        color: #888;
        margin-top: 4px;
        text-align: right;
    }

    /* Reply Box */
    #replyBox {
        display: none;
        background: #f0f0f0;
        border-left: 5px solid #34b7f1;
        padding: 8px 12px;
        position: relative;
        border-top: 1px solid #ddd;
    }

    /* Input */
    .chat-input{
        padding:10px;
        border-top:1px solid #eee;
        background:white;
        flex-shrink:0;
    }

    </style>
</head>

<body>

<div class="chat-container">

    <!-- HEADER -->
    <div class="chat-header">
        <a href="{{ url_for('page_routes.dashboard_page') }}" class="back-btn">←</a>
        <span class="title">FAPAKI Laundry</span>
    </div>

    <!-- BODY -->
    <div class="chat-body" id="chatBody">

        <div class="message bot">
            Halo 👋 ada yang bisa saya bantu?
        </div>

    </div>

    <!-- INPUT -->
    <div class="chat-input">

        <!-- REPLY BOX -->
        <div id="replyBox">
            <small>
                Reply ke:
                <span id="replyText"></span>
            </small>

            <button
                type="button"
                onclick="clearReply()"
                style="float:right;border:none;background:none;"
            >
                ✖
            </button>
        </div>

        <form id="chatForm">

            <div class="input-group">

                <input
                    type="text"
                    id="messageInput"
                    class="form-control"
                    placeholder="Ketik pesan..."
                >

                <button class="btn btn-primary">
                    Send
                </button>

            </div>

        </form>

    </div>

</div>

<script>

const form = document.getElementById("chatForm");
const input = document.getElementById("messageInput");
const chatBody = document.getElementById("chatBody");
const replyBox = document.getElementById("replyBox");
const replyTextEl = document.getElementById("replyText");

let replyId = null;

// =========================
// SCROLL TO MESSAGE
// =========================
function scrollToMessage(chatId) {

    if (!chatId) return;

    const target = document.querySelector(
        `[data-chat-id="${chatId}"]`
    );

    if (!target) return;

    target.scrollIntoView({
        behavior: "smooth",
        block: "center"
    });

    target.classList.add("highlight");

    setTimeout(() => {
        target.classList.remove("highlight");
    }, 3000);
}

// =========================
// ADD MESSAGE
// =========================
function addMessage(
    text,
    type,
    chatId = null,
    replyTargetId = null
){

    const messageEl = document.createElement("div");

    messageEl.className = "message " + type;

    // reply indicator
    if (replyTargetId) {

        const replyMini = document.createElement("div");

        replyMini.style.fontSize = "11px";
        replyMini.style.background = "rgba(0,0,0,0.05)";
        replyMini.style.padding = "4px 6px";
        replyMini.style.marginBottom = "5px";
        replyMini.style.borderLeft = "3px solid #34b7f1";

        replyMini.innerText =
            `↩ Reply ke ID: ${replyTargetId}`;

        messageEl.appendChild(replyMini);
    }

    const bodyEl = document.createElement("div");

    bodyEl.style.whiteSpace = "pre-wrap";
    bodyEl.innerText = text;

    messageEl.appendChild(bodyEl);

    // waktu
    const timeEl = document.createElement("span");

    timeEl.className = "message-time";

    const now = new Date();

    timeEl.innerText =
        now.getHours().toString().padStart(2, '0')
        + ":" +
        now.getMinutes().toString().padStart(2, '0');

    messageEl.appendChild(timeEl);

    // id chat
    if (chatId) {

        const idEl = document.createElement("div");

        idEl.style.fontSize = "10px";
        idEl.style.color = "#999";

        idEl.innerText = `ID: ${chatId}`;

        messageEl.appendChild(idEl);

        messageEl.dataset.chatId = chatId;
    }

    // reply target
    if (replyTargetId) {
        messageEl.dataset.replyTo = replyTargetId;
    }

    // click reply
    messageEl.onclick = () => {

        if (type === "bot") {

            if (!messageEl.dataset.chatId) return;

            replyId = messageEl.dataset.chatId;

            replyBox.style.display = "block";

            replyTextEl.innerText =
                `ID: ${replyId}`;

            input.focus();
        }

        const refId = messageEl.dataset.replyTo;

        if (refId) {
            scrollToMessage(refId);
        }
    };

    chatBody.appendChild(messageEl);

    chatBody.scrollTop = chatBody.scrollHeight;
}

// =========================
// CLEAR REPLY
// =========================
function clearReply(){

    replyId = null;

    replyBox.style.display = "none";
}

// =========================
// SUBMIT FORM
// =========================
form.addEventListener(
    "submit",
    async function(e){

    e.preventDefault();

    let message = input.value;

    if (!message.trim()) return;

    let currentReplyId = replyId;

    addMessage(
        message,
        "user",
        null,
        currentReplyId
    );

    input.value = "";

    clearReply();

    try{

        let res = await fetch("/chat", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                message: message,
                reply_id: currentReplyId
            })
        });

        let data = await res.json();

        let resp = data.response
            ? data.response
            : data;

        let newChatId =
            resp.chat_id || null;

        let botText = "";

        // alasan
        if (
            resp.data &&
            Array.isArray(resp.data) &&
            resp.data.length > 0 &&
            "alasan" in resp.data[0]
        ){

            botText += `💡 ${resp.summary}\n\n`;

            resp.data.forEach(item => {

                botText +=
`${item.rank}. ${item.nama}
👉 ${item.alasan}

`;
            });
        }

        // hadiah
        else if (
            resp.data &&
            Array.isArray(resp.data) &&
            resp.data.length > 0 &&
            "hadiah" in resp.data[0]
        ){

            botText += `🎁 ${resp.summary}\n`;

            resp.data.forEach(item => {

                botText +=
`\n${item.rank}. ${item.nama.toUpperCase()}
🎁 Hadiah: ${item.hadiah}
🧾 Syarat: ${item.syarat}
────────────────
`;
            });
        }

        // ranking
        else if (
            resp.data &&
            typeof resp.data === 'object'
        ){

            const keys =
                Object.keys(resp.data);

            if (keys.length > 0){

                const firstKey = keys[0];

                const firstGroup =
                    resp.data[firstKey];

                botText +=
`🏆 DAFTAR ${firstKey.toUpperCase()}:
📅 ${resp.summary}

`;

                const list =
                    firstGroup.data || [];

                list.forEach((item, i) => {

                    let nilaiWP =
                        item.nilai_wp
                        ? Number(item.nilai_wp).toFixed(4)
                        : "0.0000";

                    botText +=
`${i+1}. ${item.nama} (WP: ${nilaiWP})
`;
                });
            }
        }

        // biasa
        else {

            botText =
                resp.message ||
                "Data tidak ditemukan";
        }

        addMessage(
            botText,
            "bot",
            newChatId
        );

    }catch(err){

        console.log(err);

        addMessage(
            "Terjadi kesalahan koneksi.",
            "bot"
        );
    }
});

</script>

{% endblock %}
