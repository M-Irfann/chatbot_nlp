{% extends "pages/main.html" %}

{% block title %}
FAPAKI Laundry
{% endblock %}

{% block head %}
<style>
    .login_page {
        height: 100dvh;
        margin: auto;
        max-width: 500px;
        background: #111;
        font-family: sans-serif;
        position: relative;
        overflow: hidden;
    }

    .header {
        height: 220px;
        padding: 25px;
        color: white;
        background: linear-gradient(135deg, #5f8dee, #3f6ed6);
    }

    .brand-small {
        font-size: 14px;
        opacity: 0.9;
        font-weight: bold;
    }

    .brand-title {
        font-size: 28px;
        font-weight: bold;
    }

    .cards {
        margin-top: 50px;
        width: 100%;
        max-width: 300px;
    }

    .form-group {
        margin-top: 15px;
    }

    .card-body {
        position: absolute;
        top: 140px;
        left: 0;
        right: 0;
        bottom: 0;

        background: #f5f5f5;
        border-radius: 25px 25px 0 0;
        padding: 20px;

        display: flex;
        justify-content: center;
        align-items: flex-start;
    }

    .form-group label {
        font-size: 13px;
        color: #444;
        display: block;
        margin-bottom: 5px;
    }

    .form-group input {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: none;
        background: #e0e0e0;
        outline: none;
    }

    .btn-login {
        margin-top: 25px;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #4c6edb;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    .error-message {
        background: #ffdede;
        color: #b30000;
        padding: 10px;
        border-radius: 10px;
        margin-top: 15px;
        font-size: 13px;
    }
</style>
{% endblock %}

{% block content %}

<div class="login_page">

    <div class="header">
        <p class="brand-small">FAPAKI</p>
        <h1 class="brand-title">Laundry</h1>
    </div>

    <div class="card-body">

        <div class="cards">

            <h3>Login</h3>

            <form method="POST">

                {% if error %}
                    <div class="error-message">
                        {{ error }}
                    </div>
                {% endif %}

                <div class="form-group">
                    <label>Email</label>

                    <input 
                        type="email"
                        name="email"
                        placeholder="Masukan Email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Password</label>

                    <input 
                        type="password"
                        name="password"
                        placeholder="Masukan Password"
                        required
                    >
                </div>

                <button type="submit" class="btn-login">
                    Masuk
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
