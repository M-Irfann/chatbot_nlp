{% extends "pages/main.html" %}

{% block title %}
FAPAKI Laundry
{% endblock %}

{% block head %}
<style>
    .header_page {
        height: 100dvh;
        max-width: 500px;
        margin: auto;
        background: #111;
        font-family: sans-serif;
        position: relative;
        overflow: hidden;
    }

    .header {
        height: 170px;
        padding: 25px 20px;
        color: white;
        background: linear-gradient(135deg, #5f8dee, #3f6ed6);
        font-weight: 700;
        display: flex;
        align-items: center;
        position: relative;
        justify-content: center;
    }

    .back-btn {
        position: absolute;
        left: 15px;
        top: 10px;
        font-size: 40px;
        color: white;
        text-decoration: none;
        cursor: pointer;
    }

    .header h3 {
        margin: 0;
        font-weight: 700;
        font-size: 20px;
        text-align: center;
    }

    .card-body {
        position: absolute;
        top: 140px;
        left: 0;
        right: 0;
        bottom: 0;

        background: #f5f5f5;
        border-radius: 25px 25px 0 0;
        padding: 20px;

        box-shadow: 0 -10px 15px rgba(0,0,0,0.2);

        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .form {
        width: 100%;
        margin-top: 10px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 15px;
    }

    .form-group label {
        font-size: 13px;
        color: #555;
        margin-bottom: 5px;
    }

    .form-group input {
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: #e0e0e0;
        outline: none;
        font-size: 14px;
    }

    .btn-submit {
        margin-top: 10px;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #4c6edb;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    .btn-submit:hover {
        opacity: 0.9;
    }
</style>
{% endblock %}

{% block content %}

<div class="header_page">

    <div class="header">
        <a href="{{ url_for('page_routes.dashboard_page') }}" class="back-btn">←</a>
        <h3>Input Bobot Kriteria</h3>
    </div>

    <div class="card-body">

        <form class="form" method="POST">

            <div class="form-group">
                <label>Frekuensi Sering Cuci</label>

                <input 
                    type="number"
                    step="0.01"
                    name="bobot_frekuensi"
                    value="{{ bobot.bobot_frekuensi }}"
                    placeholder="Bobot Frekuensi"
                    required
                >
            </div>

            <div class="form-group">
                <label>Total Kg</label>

                <input 
                    type="number"
                    step="0.01"
                    name="bobot_total_kg"
                    value="{{ bobot.bobot_total_kg }}"
                    placeholder="Bobot Total Kg"
                    required
                >
            </div>

            <div class="form-group">
                <label>Total Nominal</label>

                <input 
                    type="number"
                    step="0.01"
                    name="bobot_total_nominal"
                    value="{{ bobot.bobot_total_nominal }}"
                    placeholder="Bobot Total Nominal"
                    required
                >
            </div>

            <div class="form-group">
                <label>Jenis Cuci</label>

                <input 
                    type="number"
                    step="0.01"
                    name="bobot_jenis_cuci"
                    value="{{ bobot.bobot_jenis_cuci }}"
                    placeholder="Bobot Jenis Cuci"
                    required
                >
            </div>

            <button type="submit" class="btn-submit">
                Simpan
            </button>

        </form>

    </div>

</div>

{% endblock %}
