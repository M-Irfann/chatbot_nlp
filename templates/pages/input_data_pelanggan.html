{% extends "pages/main.html" %}

{% block title %}
FAPAKI Laundry
{% endblock %}

{% block head %}
<style>
    .header_page {
        max-width: 500px;
        height: 100dvh;
        margin: auto;
        background: #111;
        font-family: sans-serif;
        position: relative;
        overflow: hidden;
    }

    /* 🔵 header biru */
    .header {
        height: 170px;
        padding: 25px 20px;
        color: white;
        background: linear-gradient(135deg, #5f8dee, #3f6ed6);
        font-weight: 700;
        display: flex;

        position: relative;
        align-items: center;
        justify-content: center;
    }

    .header h3 {
        margin: 0;
        font-weight: 700;
        font-size: 20px;
        text-align: center;
    }

    .back-btn {
        position: absolute;
        left: 15px;
        top: 15px;

        font-size: 35px;
        color: white;
        text-decoration: none;
        cursor: pointer;
    }

    /* ⚪ card putih */
    .cards {
        margin-top: 50px;
        width: 100%;
        max-width: 300px;
    }

    .card-body {
        position: absolute;
        top: 140px;
        left: 0;
        right: 0;
        bottom: 0;

        box-shadow: 0 -10px 15px rgba(0,0,0,0.2);
        background: #f5f5f5;
        border-radius: 25px 25px 0 0;
        padding: 20px;

        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* form container */
    .form {
        width: 100%;
        margin-top: 10px;
    }

    /* tiap field */
    .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 15px;
    }

    /* label */
    .form-group label {
        font-size: 13px;
        color: #555;
        margin-bottom: 5px;
    }

    /* input */
    .form-group input {
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: #e0e0e0;
        outline: none;
    }

    /* tombol */
    .btn-submit {
        margin-top: 10px;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #4c6edb;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }
    .form-group select{
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: #e0e0e0;
        outline: none;
    }
</style>
{% endblock %}

{% block content %}

<div class="header_page">

    <!-- Header biru -->
    <div class="header">
        <a href="{{ url_for('page_routes.dashboard_page') }}" class="back-btn">←</a>
        <h3>Input Data Pelanggan</h3>
    </div>

    <div class="card-body">

        <form
            class="form"
            method="POST"
        >

            <div class="form-group">

                <label>Nama</label>

                <input
                    type="text"
                    name="nama"
                    value="{% if pelanggan %}{{ pelanggan.nama }}{% endif %}"
                    placeholder="Masukkan nama"
                    {% if pelanggan %}readonly{% endif %}
                >
            </div>

            <div class="form-group">
                <label>Jenis cuci</label>
               
                <select name="jenis_cuci">
                    <option value="">
                        -- Pilih Jenis Cuci --
                    </option>
                    {% for item in jenis_cuci %}
                        <option value="{{ item.nama_jenis }}">
                            {{ item.nama_jenis }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>Berat Kg</label>
                <input
                    type="number"
                    name="berat"
                    step="0.1"
                    placeholder="Masukan Seperti ini 1.3 / 2.1"
                >
            </div>
           <div class="form-group">

                <label>Harga</label>
                <!-- tampilan -->
                <input
                    type="text"
                    id="hargaDisplay"
                    placeholder="Harga"
                >
                <!-- yang dikirim -->
                <input
                    type="hidden"
                    name="nominal"
                    id="hargaAsli"
                >
            </div>
            <div class="form-group">
                <label>No Telepon <b>(Opsional)</b></label>
                <input
                    type="text"
                    name="no_telepon"
                    value="{% if pelanggan and pelanggan.no_telepon %}{{ pelanggan.no_telepon }}{% endif %}"

                    placeholder="No Telepon"
                >
            </div>

            <div class="form-group">
                <label>Tanggal</label>
                <input
                    type="date"
                    name="tanggal"
                    value="{{ today }}"
                >
            </div>

            <button class="btn-submit">
                Simpan
            </button>

        </form>

    </div>

</div>
<script>

const hargaDisplay = document.getElementById("hargaDisplay")
const hargaAsli = document.getElementById("hargaAsli")

hargaDisplay.addEventListener("input", function(){

    let angka = this.value.replace(/[^0-9]/g, '')

    hargaAsli.value = angka

    this.value = new Intl.NumberFormat(
        'id-ID'
    ).format(angka)

})

</script>

{% endblock %}
